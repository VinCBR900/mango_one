name: Build from upstream

on:
  schedule:
    - cron: '0 6 * * *'   # runs daily at 06:00 UTC
  workflow_dispatch:        # also allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get install -y gcc curl python3

      - name: Run Makefile
        run: make

      - name: Commit updated VH files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rom_init.vh ram_init.vh
          git diff --staged --quiet || git commit -m "Auto-rebuild from upstream [skip ci]"
          git push
